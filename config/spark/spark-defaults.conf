# Default system properties included when running spark-submit
# This is useful for setting default environmental settings.

# Example:
# spark.master                     spark://master:7077
# spark.eventLog.enabled           true
# spark.eventLog.dir               hdfs://namenode:8021/directory
# spark.serializer                 org.apache.spark.serializer.KryoSerializer
# spark.driver.memory              5g
# spark.executor.extraJavaOptions  -XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"

# Spark Master
spark.master                        spark://spark-master:7077

# Hadoop Configuration
spark.hadoop.fs.defaultFS          hdfs://hadoop-master:9000
spark.hadoop.dfs.replication       2

# Driver and Executor Configuration
spark.driver.memory                 1g
spark.driver.cores                  2
spark.executor.memory               1g
spark.executor.cores                2
spark.executor.instances            2

# Event Log Configuration
spark.eventLog.enabled              true
spark.eventLog.dir                  hdfs://hadoop-master:9000/spark-logs

# Network
spark.driver.host                   spark-master
spark.driver.port                   7001

# Serializer
spark.serializer                    org.apache.spark.serializer.KryoSerializer

# UI Configuration
spark.ui.port                       4040
spark.ui.enabled                    true

# Dynamic Allocation (optional)
# spark.dynamicAllocation.enabled   true
# spark.shuffle.service.enabled     true

# Python and PySpark Configuration
spark.python.worker.reuse           true

# Logging
spark.logConf                       true

# SQL Configuration
spark.sql.shuffle.partitions        200
